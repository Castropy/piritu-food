<div class="p-6 bg-gray-50 min-h-screen">
  <div class="flex justify-between items-center mb-6">
    <div>
      <h2 class="text-2xl font-black text-gray-800 tracking-tight">MI CATÁLOGO</h2>
      <p class="text-gray-500 text-sm">Gestiona la disponibilidad y precios de tus productos</p>
    </div>
    <button [routerLink]="['new']" 
            class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-3 rounded-2xl font-bold transition-all shadow-lg flex items-center gap-2">
      <i class="pi pi-plus"></i>
      Nuevo Producto
    </button>
  </div>

  <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
    <p-table [value]="products()" 
             [rows]="10" 
             [paginator]="true" 
             responsiveLayout="stack" 
             breakpoint="960px"
             styleClass="p-datatable-sm">
      
      <ng-template pTemplate="header">
        <tr>
          <th class="bg-gray-50 text-gray-600 font-bold p-4">Producto</th>
          <th class="bg-gray-50 text-gray-600 font-bold p-4">Categoría</th>
          <th class="bg-gray-50 text-gray-600 font-bold p-4 text-center">Precio</th>
          <th class="bg-gray-50 text-gray-600 font-bold p-4 text-center">Disponible</th>
          <th class="bg-gray-50 text-gray-600 font-bold p-4 text-center">Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-product>
        <tr class="hover:bg-gray-50 transition-colors">
          <td class="p-4">
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-xl bg-gray-100 flex items-center justify-center overflow-hidden">
                <img [src]="product.image_url || 'assets/placeholder-food.png'" 
                     class="w-full h-full object-cover">
              </div>
              <span class="font-bold text-gray-700">{{ product.name }}</span>
            </div>
          </td>
          <td class="p-4">
             <p-tag [value]="product.category_id" severity="info" [rounded]="true"></p-tag>
          </td>
          <td class="p-4 text-center">
            <span class="font-black text-orange-600">{{ product.price | currency:'USD' }}</span>
          </td>
          <td class="p-4 text-center">
            <p-inputSwitch [(ngModel)]="product.is_available" 
                          (onChange)="toggleAvailability(product)">
            </p-inputSwitch>
          </td>
          <td class="p-4 text-center">
            <button pButton icon="pi pi-pencil" 
                    [routerLink]="[product.id]" 
                    class="p-button-rounded p-button-text p-button-warning">
            </button>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="p-10 text-center text-gray-400 italic">
            No tienes productos registrados aún. ¡Comienza agregando el primero!
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
